<!DOCTYPE html> <html lang="nl"> <head> <meta charset="UTF-8" /> <meta name="viewport" content="width=device-width, initial-scale=1.0" /> <title>DroneTech Grader</title> <style> body { font-family: Arial, sans-serif; margin: 0; padding: 24px; background: #f3f6fb; color: #1e293b; } .container { max-width: 980px; margin: 0 auto; } .card { background: #fff; border-radius: 16px; padding: 20px; margin-bottom: 20px; box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08); } h1, h2, h3 { margin-top: 0; } .muted { color: #64748b; font-size: 14px; } label { display: block; margin: 12px 0 6px; font-weight: bold; } input, textarea, button { width: 100%; box-sizing: border-box; padding: 12px; font-size: 15px; border-radius: 10px; border: 1px solid #cbd5e1; } textarea { min-height: 100px; resize: vertical; } button { background: #2563eb; color: white; border: none; cursor: pointer; font-weight: bold; margin-top: 12px; } button:hover { background: #1d4ed8; } .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; } .result-grid { display: grid; grid-template-columns: 160px 1fr 140px; gap: 12px; margin-top: 16px; } .result-box { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 14px; } .score { font-size: 34px; font-weight: bold; color: #0f172a; } .confidence { font-size: 28px; font-weight: bold; color: #0f172a; } .ok { color: #15803d; font-weight: bold; } .error { color: #b91c1c; font-weight: bold; } pre { white-space: pre-wrap; word-break: break-word; background: #0f172a; color: #e2e8f0; padding: 16px; border-radius: 12px; overflow-x: auto; } @media (max-width: 800px) { .row, .result-grid { grid-template-columns: 1fr; } } </style> </head> <body> <div class="container"> <div class="card"> <h1>DroneTech Grader</h1> <p class="muted"> Testomgeving voor de nakijkbot. Eerst testen we backend, database en OpenAI. </p> </div> <div class="card"> <h2>1. Verbinding</h2> <label for="apiBase">API basis-URL</label> <input id="apiBase" type="text" value="https://christiane-turfy-guiltily.ngrok-free.dev" /> <label for="apiKey">Grader API key</label> <input id="apiKey" type="text" placeholder="Plak hier je GRADER_API_KEY" /> <button onclick="checkHealth()">Check backend</button> <div id="healthStatus" class="muted" style="margin-top:12px;">Nog niet getest.</div> <pre id="healthOutput">Nog niet getest.</pre> </div> <div class="card"> <h2>2. Test nakijkrun</h2> <div class="row"> <div> <label for="classId">Class ID</label> <input id="classId" type="text" value="test-class" /> </div> <div> <label for="assignmentId">Assignment ID</label> <input id="assignmentId" type="text" value="test-assignment" /> </div> </div> <button onclick="startRun()">Start nakijkrun</button> <pre id="runOutput">Nog niet gestart.</pre> </div> <div class="card"> <h2>3. Test OpenAI-beoordeling</h2> <label for="question">Vraag</label> <textarea id="question">Waar staat de afkorting GPS voor?</textarea> <label for="rubric">Rubric</label> <textarea id="rubric">2 punten: Global Positioning System. 1 punt: iets met satellieten. 0 punten: onjuist antwoord.</textarea> <label for="answer">Antwoord student</label> <textarea id="answer">Global Positioning System</textarea> <button onclick="testOpenAI()">Beoordeel antwoord</button> <div class="result-grid"> <div class="result-box"> <h3>Score</h3> <div id="scoreValue" class="score">-</div> </div> <div class="result-box"> <h3>Feedback</h3> <div id="feedbackValue">Nog geen beoordeling.</div> </div> <div class="result-box"> <h3>Confidence</h3> <div id="confidenceValue" class="confidence">-</div> </div> </div> <h3 style="margin-top:20px;">Ruwe output</h3> <pre id="openaiOutput">Nog niet getest.</pre> </div> </div> <script> function getHeaders() { return { "Content-Type": "application/json", "x-api-key": document.getElementById("apiKey").value.trim(), "ngrok-skip-browser-warning": "true" }; } async function checkHealth() { const apiBase = document.getElementById("apiBase").value.trim(); const output = document.getElementById("healthOutput"); const status = document.getElementById("healthStatus"); output.textContent = "Bezig..."; status.textContent = "Verbinden..."; try { const response = await fetch(`${apiBase}/health`, { headers: { "ngrok-skip-browser-warning": "true" } }); const data = await response.json(); output.textContent = JSON.stringify(data, null, 2); status.innerHTML = `<span class="ok">Backend bereikbaar</span>`; } catch (error) { output.textContent = `Fout: ${error.message}`; status.innerHTML = `<span class="error">Backend niet bereikbaar</span>`; } } async function startRun() { const apiBase = document.getElementById("apiBase").value.trim(); const classId = document.getElementById("classId").value.trim(); const assignmentId = document.getElementById("assignmentId").value.trim(); const output = document.getElementById("runOutput"); output.textContent = "Bezig..."; try { const response = await fetch(`${apiBase}/api/grade/start`, { method: "POST", headers: getHeaders(), body: JSON.stringify({ classId, assignmentId }) }); const data = await response.json(); output.textContent = JSON.stringify(data, null, 2); } catch (error) { output.textContent = `Fout: ${error.message}`; } } async function testOpenAI() { const apiBase = document.getElementById("apiBase").value.trim(); const question = document.getElementById("question").value.trim(); const rubric = document.getElementById("rubric").value.trim(); const answer = document.getElementById("answer").value.trim(); const output = document.getElementById("openaiOutput"); const scoreValue = document.getElementById("scoreValue"); const feedbackValue = document.getElementById("feedbackValue"); const confidenceValue = document.getElementById("confidenceValue"); output.textContent = "Bezig..."; scoreValue.textContent = "-"; feedbackValue.textContent = "Bezig met beoordelen..."; confidenceValue.textContent = "-"; try { const response = await fetch(`${apiBase}/api/grade/demo-openai`, { method: "POST", headers: getHeaders(), body: JSON.stringify({ question, rubric, answer }) }); const data = await response.json(); output.textContent = JSON.stringify(data, null, 2); if (data.parsed && !data.parsed.parseError) { scoreValue.textContent = data.parsed.score ?? "-"; feedbackValue.textContent = data.parsed.feedback_student ?? "Geen feedback."; confidenceValue.textContent = data.parsed.confidence ?? "-"; } else { feedbackValue.textContent = "JSON kon niet netjes worden gelezen."; } } catch (error) { output.textContent = `Fout: ${error.message}`; feedbackValue.textContent = "Er ging iets mis."; } } </script> </body> </html>
